# Clarive — Self-hosted deployment
#
# Quick start:
#   1. cp .env.example .env
#   2. Fill in the 3 required secrets (see comments in .env.example)
#   3. docker compose up -d
#   4. Open http://localhost:8080
#
# This pulls the pre-built image from Docker Hub.
# To build from source instead, see deploy/docker-compose.yml.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clarive}
      POSTGRES_USER: ${POSTGRES_USER:-clarive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env — see .env.example for generation command}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clarive} -d ${POSTGRES_DB:-clarive}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: >-
      valkey-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - valkeydata:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  clarive:
    image: pinkrooster/clarive:${CLARIVE_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "${CLARIVE_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-clarive};Username=${POSTGRES_USER:-clarive};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__Valkey: ${VALKEY_URL:-valkey:6379}
      Jwt__Secret: ${JWT_SECRET:?Set JWT_SECRET in .env — see .env.example for generation command}
      Jwt__Issuer: ${JWT_ISSUER:-Clarive}
      Jwt__Audience: ${JWT_AUDIENCE:-Clarive}
      Cors__AllowedOrigins__0: ${CORS_ORIGINS:-http://localhost:8080}
      App__FrontendUrl: ${CORS_ORIGINS:-http://localhost:8080}
      AllowedHosts: "*"
      Ai__DefaultModel: ${AI_DEFAULT_MODEL:-gpt-4o-mini}
      Ai__PremiumModel: ${AI_PREMIUM_MODEL:-gpt-4o}
      Google__ClientId: ${GOOGLE_CLIENT_ID:-}
      Google__ClientSecret: ${GOOGLE_CLIENT_SECRET:-}
      GitHub__ClientId: ${GITHUB_CLIENT_ID:-}
      GitHub__ClientSecret: ${GITHUB_CLIENT_SECRET:-}
      Email__Provider: ${EMAIL_PROVIDER:-none}
      Email__ApiKey: ${EMAIL_API_KEY:-}
      Email__FromAddress: ${EMAIL_FROM_ADDRESS:-noreply@localhost}
      Email__FromName: ${EMAIL_FROM_NAME:-Clarive}
      CONFIG_ENCRYPTION_KEY: ${CONFIG_ENCRYPTION_KEY:?Set CONFIG_ENCRYPTION_KEY in .env — see .env.example for generation command}
      VITE_API_URL: /api
      VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    volumes:
      - avatars:/app/data/avatars
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

volumes:
  pgdata:
  avatars:
  valkeydata:
