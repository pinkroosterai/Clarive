# Clarive — Build-from-source deployment
#
# Builds the unified image locally from the root Dockerfile.
# Uses deploy/.env for configuration.
#
# Usage:
#   make deploy          (recommended — builds, tags, health-checks)
#   make dev             (development with hot reload)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clarive}
      POSTGRES_USER: ${POSTGRES_USER:-clarive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in deploy/.env}
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clarive} -d ${POSTGRES_DB:-clarive}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: >-
      valkey-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - valkeydata:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  clarive:
    container_name: clarive-app
    build:
      context: ..
      dockerfile: Dockerfile
      target: production
    image: clarive:${CLARIVE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${CLARIVE_PORT:-8080}:8080"
    environment:
      # Infrastructure only — all other settings configured via Super Admin UI
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-clarive};Username=${POSTGRES_USER:-clarive};Password=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in deploy/.env}"
      ConnectionStrings__Valkey: ${VALKEY_URL:-valkey:6379}
      Jwt__Secret: ${JWT_SECRET:?Set JWT_SECRET in deploy/.env}
      Cors__AllowedOrigins__0: ${CORS_ORIGINS:-http://localhost:8080}
      App__FrontendUrl: ${CORS_ORIGINS:-http://localhost:8080}
      AllowedHosts: "*"
      CONFIG_ENCRYPTION_KEY: ${CONFIG_ENCRYPTION_KEY:?Set CONFIG_ENCRYPTION_KEY in deploy/.env}
      VITE_API_URL: /api
    volumes:
      - avatars:/app/data/avatars
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:5000/healthz/live || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

volumes:
  pgdata:
  avatars:
  valkeydata:
