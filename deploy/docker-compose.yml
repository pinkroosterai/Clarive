# Clarive — Base compose file (production defaults).
#
# Production:  make deploy          (builds images, uses deploy/.env)
# Development: make dev             (uses docker-compose.dev.yml override)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clarive}
      POSTGRES_USER: ${POSTGRES_USER:-clarive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in deploy/.env}
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clarive} -d ${POSTGRES_DB:-clarive}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    container_name: clarive-backend
    image: clarive-backend:${CLARIVE_TAG:-latest}
    restart: unless-stopped
    expose:
      - "5000"
    networks:
      - default
      - proxy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-clarive};Username=${POSTGRES_USER:-clarive};Password=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in deploy/.env}"
      Jwt__Secret: ${JWT_SECRET:?Set JWT_SECRET in deploy/.env}
      Jwt__Issuer: ${JWT_ISSUER:-Clarive}
      Jwt__Audience: ${JWT_AUDIENCE:-Clarive}
      Cors__AllowedOrigins__0: ${CORS_ORIGINS:-http://localhost:8080}
      App__FrontendUrl: ${CORS_ORIGINS:-http://localhost:8080}
      App__AllowRegistration: ${ALLOW_REGISTRATION:-true}
      Ai__OpenAiApiKey: ${OPENAI_API_KEY:-}
      Ai__EndpointUrl: ${AI_ENDPOINT_URL:-}
      Ai__DefaultModel: ${AI_DEFAULT_MODEL:-gpt-4o-mini}
      Ai__PremiumModel: ${AI_PREMIUM_MODEL:-gpt-4o}
      Google__ClientId: ${GOOGLE_CLIENT_ID:-}
      Google__ClientSecret: ${GOOGLE_CLIENT_SECRET:-}
      Email__Provider: ${EMAIL_PROVIDER:-none}
      Email__ApiKey: ${EMAIL_API_KEY:-}
      Email__SmtpHost: ${EMAIL_SMTP_HOST:-}
      Email__SmtpPort: ${EMAIL_SMTP_PORT:-587}
      Email__SmtpUsername: ${EMAIL_SMTP_USERNAME:-}
      Email__SmtpPassword: ${EMAIL_SMTP_PASSWORD:-}
      Email__SmtpUseTls: ${EMAIL_SMTP_USE_TLS:-true}
      Email__FromAddress: ${EMAIL_FROM_ADDRESS:-noreply@clarive.app}
      Email__FromName: ${EMAIL_FROM_NAME:-Clarive}
      RateLimiting__StrictPermitLimit: ${RATE_LIMIT_STRICT:-5}
      AllowedHosts: ${ALLOWED_HOSTS:-${CORS_ORIGINS:-localhost}}
      CONFIG_ENCRYPTION_KEY: ${CONFIG_ENCRYPTION_KEY:?Set CONFIG_ENCRYPTION_KEY in deploy/.env}
    volumes:
      - avatars:/app/data/avatars
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    container_name: clarive-frontend
    image: clarive-frontend:${CLARIVE_TAG:-latest}
    restart: unless-stopped
    expose:
      - "8080"
    networks:
      - default
      - proxy
    environment:
      VITE_API_URL: ${VITE_API_URL:-/api}
      VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
  avatars:

networks:
  proxy:
    external: true
