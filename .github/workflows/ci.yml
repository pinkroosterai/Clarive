name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json
      - run: npm ci --ignore-scripts
        working-directory: src/frontend
      - run: npm run lint
        working-directory: src/frontend

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json
      - run: npm ci --ignore-scripts
        working-directory: src/frontend
      - run: npx vitest run --passWithNoTests
        working-directory: src/frontend

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json
      - run: npm ci --ignore-scripts
        working-directory: src/frontend
      - run: npm run build
        working-directory: src/frontend

  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet build --configuration Release --nologo
        working-directory: src/backend/Clarive.Api

  backend-unit-tests:
    name: Backend Unit Tests
    needs: backend-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet test --nologo --verbosity normal
        working-directory: tests/backend/Clarive.Api.UnitTests

  backend-integration-tests:
    name: Backend Integration Tests
    needs: backend-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet test --nologo --verbosity normal
        working-directory: tests/backend/Clarive.Api.IntegrationTests

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build production image
        run: docker build --target production -t clarive:ci-test .
      - name: Build dev-backend image
        run: docker build --target dev-backend -t clarive:dev-backend-ci-test .
      - name: Build dev-frontend image
        run: docker build --target dev-frontend -t clarive:dev-frontend-ci-test .
